"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "main-window-commands"
description = "Clipboard panel: entries, copy, activate, hide, open settings"
commands.allow = [
  "frontend_ready",
  "get_entries",
  "delete_entry",
  "pin_entry",
  "set_entry_collection",
  "get_collections",
  "create_collection",
  "delete_collection",
  "hide_main_window",
  "resize_main_window",
  "open_settings_window",
  "copy_entry",
  "activate_entry",
  "paste_entry",
  "retag_entry",
  "is_tagging_ready",
  "get_app_settings",
  # Read candidate for header status; add for one-tap Exclude (same trust as settings).
  "get_excludable_app_candidate",
  "add_excludable_app_candidate",
]
